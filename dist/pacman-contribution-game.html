<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Pac-Man</title>
    <meta name="theme-color" content="#0d1117" />
    <style>
      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-height: 100vh;
        display: flex;
        justify-content: center;
        align-items: flex-start;
        background:
          radial-gradient(circle at 12% 14%, color-mix(in srgb, #f2cc60 18%, transparent), transparent 22%),
          radial-gradient(circle at 86% 18%, color-mix(in srgb, #49b6ff 14%, transparent), transparent 20%),
          radial-gradient(circle at 78% 84%, color-mix(in srgb, #ff8cf0 12%, transparent), transparent 22%),
          linear-gradient(180deg, color-mix(in srgb, #0d1117 88%, #111827 12%), #0d1117);
        color: #e6edf3;
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      }

      main {
        width: min(1320px, 100%);
        margin: 0 auto;
        padding: 36px 24px 44px;
      }

      .demo-shell {
        display: block;
      }

      .board-frame {
        padding: 0;
      }

      .canvas-shell {
        padding: 0;
        background: transparent;
      }

      .game-canvas {
        display: block;
        width: 100%;
        max-width: 100%;
        margin: 0 auto;
        filter: drop-shadow(0 28px 48px rgba(0, 0, 0, 0.3));
      }

      @media (max-width: 760px) {
        main {
          padding: 18px 12px;
        }
      }
    </style>
  </head>
